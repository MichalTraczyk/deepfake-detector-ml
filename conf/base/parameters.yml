preprocess:
  train_ratio: 0.8
  mode_multi: "multi"
  mode_single: "single"

  celeb_df_output: "data/02_processed/celeb_df"
  celeb_df_dirs:
    real:
      - "data/01_raw/Celeb-DF-v2/Celeb-real"
      - "data/01_raw/Celeb-DF-v2/YouTube-real"
    fake:
      - "data/01_raw/Celeb-DF-v2/Celeb-synthesis"

  forensics_output: "data/02_processed/forensics"
  forensics_dirs:
    real: [ "data/01_raw/face_forensics/original/" ]
    fake: [ "data/01_raw/face_forensics/FaceShifter/" ]


learning_settings:
  image_resolution: 256
  k_folds: 5
  batch_size: 30
  num_epochs: 50
  learning_rate: 0.0001
  checkpoint_path_vit: "saved/cnn_checkpoint.pt"
  checkpoint_path_cnn: "saved/cnn_checkpoint.pt"
  data_dir: "data/02_processed/celeb_df"

paths:
  cnn_model_path: "data/03_models/cnn_model.pt"
  vit_model_path: "data/03_models/vit_model.pt"

vit_model:
  patch_size: 16
  embed_dim: 768
  depth: 12
  num_heads: 12
  mlp_dim: 3072
  dropout: 0.1