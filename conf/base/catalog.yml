data_loaders:
  type: MemoryDataset

trained_model_vit:
  type: pickle.PickleDataset
  filepath: data/03_models/vit_model.pt

final_metrics_vit_celeb:
  type: json.JSONDataset
  filepath: data/04_reporting/vit_metrics_celeb.json

final_metrics_vit_ff:
  type: json.JSONDataset
  filepath: data/04_reporting/vit_metrics_ff.json

trained_model_cnn:
  type: pickle.PickleDataset
  filepath: data/03_models/cnn_model.pt

final_metrics_cnn_celeb:
  type: json.JSONDataset
  filepath: data/04_reporting/cnn_metrics_celeb.json

final_metrics_cnn_ff:
  type: json.JSONDataset
  filepath: data/04_reporting/cnn_metrics_ff.json

